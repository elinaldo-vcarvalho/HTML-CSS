<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <title>Tags em HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descorbir qual deverá utilizar em casa caso.</p>
    <ul>
        <li title="Usando a Tag &lt;p&gt;" >Parágrafo</li>

        <li title="Use a Tag &lt;H1&gt; a &lt;H6&gt;">Títulos</li>

        <li title="Usando a Tag &lt;img&gt;">Imagens</li>

        <li title="Usando a Tag &lt;abbr&gt;">Abreviações</li>

        <li title="Usando a Tag &lt;CODE&gt;">Códigos-fonte</li>

        <li title="Usando a Tag &lt;OL&gt;">Lista Númerada</li>

        <li title="Uando a Tag &lt;UL&gt;">Lista demarcada</li>



    </ul>
    
</body>
</html>
