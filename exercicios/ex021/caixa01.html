<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{
        /*
            sempre seguindo a ordem para simplificar: 

            tamanho = top
            tamanho = right
            tamanho = bottom
            tamanho = left

            caso tenha cor no elemento, colocar sempre por último.
        */
            background-color: darkgoldenrod;
            
            height: 300px;
            width: 300px;

            border: 10px solid darkcyan;

            padding: 10px 10px 10px 10px;
            

            margin: 20px auto 40px auto;

            outline: 5px dashed blue;
        }

        a {
            border: 10px solid rgb(149, 83, 255);
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona. </p>
    
</body>
</html>
